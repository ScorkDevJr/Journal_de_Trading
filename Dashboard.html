<!DOCTYPE html>

<head>

<title>Dashboard</title>

    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 30px;
}
h1 {
    margin-bottom: 20px;
}
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}
a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>📊 Mon Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Journal Trading</h3>
        <a href="journal.html">Ouvrir</a>
    </div>

    <div class="card">
        <h3>Analyse BTC</h3>
        <a href="btc.html">Ouvrir</a>
    </div>

    <div class="card">
        <h3>Stats</h3>
        <a href="stats.html">Ouvrir</a>
    </div>

</div>

</body>
</html>
