<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}
input {
    padding: 10px;
    margin: 10px;
    width: 200px;
    border-radius: 5px;
    border: none;
}

    padding: 10px 20px;

    border: none;
    border-radius: 5px;

</head>

<body>

<div class="box">
    <h2>Connexion</h2>
    <input type="password" id="pwd" placeholder="Mot de passe"><br>
    <button onclick="login()">Se connecter</button>
    <p id="error"></p>
</div>

<script>
function login() {
    const password = document.getElementById("pwd").value;

    if (password === "Lagestiondurisqueestlaclef17$") {
        window.location.href = "Dashboard.html";
    } else {
        document.getElementById("error").innerText = "Mot de passe incorrect";
    }
}
</script>

</body>
</html>
